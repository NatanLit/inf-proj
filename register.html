<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Регистрация</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f7fb;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.form-box {
    background: white;
    padding: 40px;
    border-radius: 20px;
    width: 350px;
    box-shadow: 0 10px 30px rgba(0,0,0,.1);
}

h2 {
    text-align: center;
    margin-bottom: 25px;
}

input {
    width: 100%;
    padding: 14px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: 1px solid #ccc;
    box-sizing: border-box;
    font-size: 14px;
}

button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: #508A57;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    opacity: .9;
}

p {
    text-align: center;
    margin-top: 15px;
}

.error {
    color: red;
    font-size: 13px;
    margin-bottom: 10px;
    display: none;
    text-align: center;
}
</style>
</head>

<body>

<div class="form-box">

<h2>Регистрация</h2>

<p class="error" id="error-msg"></p>

<form action="register.php" method="POST" onsubmit="return validate()">

<input type="text" name="name" id="name" placeholder="Имя" required>

<input type="number" name="age" id="age" placeholder="Возраст" min="1" max="120" required>

<input type="email" name="email" id="email" placeholder="Email" required>

<input type="password" name="password" id="password" placeholder="Пароль (мин. 6 символов)" required>

<button type="submit">Зарегистрироваться</button>

</form>

<p>Уже есть аккаунт? <a href="login.html">Войти</a></p>

</div>

<script>
function validate() {
    var name     = document.getElementById('name').value.trim();
    var age      = document.getElementById('age').value;
    var email    = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;
    var errorMsg = document.getElementById('error-msg');

    if (!name || !age || !email || !password) {
        errorMsg.style.display = 'block';
        errorMsg.textContent = 'Заполните все поля';
        return false;
    }

    var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
        errorMsg.style.display = 'block';
        errorMsg.textContent = 'Введите корректный email';
        return false;
    }

    if (password.length < 6) {
        errorMsg.style.display = 'block';
        errorMsg.textContent = 'Пароль должен быть не менее 6 символов';
        return false;
    }

    return true;
}
</script>

</body>
</html>
